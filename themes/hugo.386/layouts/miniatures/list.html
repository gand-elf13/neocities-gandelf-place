{{ define "main" }}
<article class="row-fluid navmargin">
    <header class="page-header">
        <h1 >Miniatures</h1>
    </header>
    <!-- "{{.Content}}" pulls from the markdown content of the corresponding _index.md -->
    {{.Content}}
</article>

<!-- Gallery container with bottom spacing -->
<div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 2rem; padding: 0 2rem 4rem 2rem;">
  {{ range .Pages.ByDate.Reverse }}
    <li style="width: 700px;">
      <ul class="nav nav-list bs-docs-sidenav" 
          style="list-style-type: none; padding: 0; margin: 0; 
                 width: 700px; border: 1px solid #eee; box-sizing: border-box; 
                 display: flex; flex-direction: column; align-items: center;">

        <!-- Image with exact width and top spacing -->
        {{ $img := findRE `!\[.*?\]\((.*?)\)` .RawContent 1 }}
        {{ if $img }}
          {{ $url := replaceRE `!\[.*?\]\((.*?)\)` "$1" (index $img 0) }}
          <img src="{{ $url | relURL }}" alt="{{ .Title }}" 
               style="width: 560px; height: auto; margin-top: 70px;">
        {{ end }}

        <!-- Title as a Link, bottom spacing adjustable manually -->
        <h2 style="text-align: center; margin: 20px 0 30px 0;">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h2>

      </ul>
    </li>
  {{ end }}
</div>
{{ end }}
