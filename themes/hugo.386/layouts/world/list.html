{{ define "main" }}
<article class="row-fluid navmargin">
    <header class="page-header">
        <h1>{{.Title}}</h1>
    </header>
    <div style="text-align: center;"> 
        {{.Content}}
    </div>
     <h3>Files : </h3>
</article>
<ul style="list-style: none; padding: 0;">
{{ range .Pages.ByTitle }}
    <li>
        <a href="{{.Permalink}}">{{.Title}}</a>
    </li>
{{ end }}
</ul>
{{ end }}
