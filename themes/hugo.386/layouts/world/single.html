{{ define "main" }}
<style>
  .world-body {
    position: relative;
  }

  .world-infobox {
    float: right;
    clear: right;
    width: 33%;
    margin: 0 0 1em 1.5em;
  }

  .world-infobox .nav-list {
    padding: 0;
  }

  .world-infobox .infobox-image img {
    width: 100%;
    height: auto;
    display: block;
  }

  .world-infobox .nav-header {
    color: #000;
    text-align: center;
  }

  .world-infobox .infobox-row {
    display: flex;
    gap: 0.5em;
    padding: 3px 6px;
  }

  .world-infobox .infobox-key {
    color: #000;
    font-weight: bold;
    flex-shrink: 0;
    width: 45%;
  }

  .world-infobox .infobox-val {
    color: #000;
  }

  .world-infobox .infobox-tags-title {
    color: #000;
    font-weight: bold;
    padding: 6px 6px 2px 6px;
    display: block;
  }

  .world-infobox .infobox-tags {
    padding: 4px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .world-infobox .infobox-tags .tag {
    color: #000;
    display: inline-block;
  }

  .world-body::after {
    content: "";
    display: table;
    clear: both;
  }
</style>

<div class="row-fluid navmargin">
  <div class="page-header">
    <h1>{{ .Title }}</h1>
  </div>

  {{ with .Params.description }}
    <p class="lead">{{ . }}</p>
  {{ end }}

  <div class="world-body">

    {{ partial "world_infobox.html" . }}

    <article class="world-content">
      {{ .Content }}
    </article>

  </div>

  <h4><a href="{{ .Site.BaseURL }}">{{ i18n "backtohome" }}</a></h4>
</div>
{{ end }}
